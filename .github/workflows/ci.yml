name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: skytrack
          POSTGRES_USER: skytrack
          POSTGRES_PASSWORD: skytrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skytrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_DB: skytrack
      POSTGRES_USER: skytrack
      POSTGRES_PASSWORD: skytrack
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GDAL/GEOS/PROJ
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binutils libproj-dev gdal-bin libgdal-dev libgeos-dev

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Ruff
        working-directory: backend
        run: ruff check .

      - name: Pytest
        working-directory: backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Vitest
        working-directory: frontend
        run: npx vitest run
